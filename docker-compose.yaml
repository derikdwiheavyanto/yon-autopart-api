services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - 5432:5432
    env_file:
      - .env.docker
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yon_autopart_network
  
  yon_autopart_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yon_autopart_api
    ports:
      - 3333:3333
    volumes:
      - ./uploads-docker:/yon-autopart-app/uploads
    env_file:
      - .env.docker
    depends_on:
      - postgres
    networks:
      - yon_autopart_network

volumes:
  postgres_data:
    name: postgres_data
networks:
  yon_autopart_network:
    name: yon_autopart_network
