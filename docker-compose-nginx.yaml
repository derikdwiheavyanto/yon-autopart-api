services:
  web:
    image: nginx
    container_name: web
    volumes:
      - ./nginx:/etc/nginx/templates
    environment:
      - NGINX_HOST=foobar.com
      - NGINX_PORT=80
      - HOST=localhost
    networks:
      - yon_autopart_network
      - ngrok_network
    depends_on:
      - yon_autopart_api
  
  ngrok:
    image: wernight/ngrok
    container_name: ngrok
    command: ngrok http web:80 
    networks:
      - ngrok_network
    env_file:
      - .env.docker
    depends_on:
      - web
    restart: always

networks:
  yon_autopart_network:
    external: true
  ngrok_network:
    name: ngrok_network
    external: true